<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="採購管理">
<meta name="theme-color" content="#9A7A78">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>設備採購管理系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#9A7A78;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Noto Sans TC','PingFang TC',sans-serif}
.sp{text-align:center;color:#fff}
.sp h1{font-size:20px;font-weight:700;margin-bottom:6px}
.sp p{font-size:13px;opacity:.75;margin-bottom:20px}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.links{margin-top:24px;display:flex;gap:12px;justify-content:center;display:none}
.lb{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;text-decoration:none;display:inline-block}
.lm{background:#fff;color:#9A7A78}
.ld{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4)}
</style>
</head>
<body>
<div class="sp">
  <h1>設備採購管理系統</h1>
  <p>正在載入...</p>
  <div class="spinner"></div>
  <div class="links" id="links">
    <a class="lb lm" href="mobile.html">📱 手機版</a>
    <a class="lb ld" href="desktop.html">💻 桌機版</a>
  </div>
</div>
<script>
(function(){
  var ua = navigator.userAgent;
  var params = new URLSearchParams(location.search);
  
  // Force override via URL param
  if(params.get('desktop')==='1'){ location.replace('desktop.html'); return; }
  if(params.get('mobile')==='1'){ location.replace('mobile.html'); return; }
  
  // Detect mobile: iPhone, iPad (both old and new iPadOS), Android, small screen
  var isMobile = 
    /iPhone|iPod/i.test(ua) ||
    /iPad/i.test(ua) ||
    (navigator.maxTouchPoints >= 2 && /Macintosh/i.test(ua)) || // iPad iPadOS
    /Android/i.test(ua) ||
    (window.innerWidth <= 1024 && navigator.maxTouchPoints >= 1);
  
  location.replace(isMobile ? 'mobile.html' : 'desktop.html');
})();
</script>
</body>
</html>
